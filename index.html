<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PDF Merger — ブラウザだけで PDF を結合</title>
  <meta name="description" content="複数の PDF をひとつにまとめるブラウザツール。ファイルはサーバーに送信されず、すべて端末内で処理されます。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PDF Merger</h1>
    <p class="lead">複数の PDF をひとつにまとめます。<strong>ファイルはあなたの端末から送信されません</strong>(すべてブラウザ内で処理)。</p>
  </header>

  <main>
    <section id="drop-zone" class="drop-zone" aria-label="PDFファイルをドロップ">
      <p>PDF をここにドラッグ&ドロップ<br>または</p>
      <label class="btn">
        ファイルを選択
        <input id="file-input" type="file" accept="application/pdf" multiple hidden>
      </label>
      <p class="hint">複数選択 / 追加ドロップで何度でも追加できます</p>
    </section>

    <section id="list-section" hidden>
      <div class="list-header">
        <h2>結合する順番</h2>
        <p class="hint">ドラッグで並べ替え / × で削除</p>
      </div>
      <ul id="file-list" class="file-list"></ul>

      <div class="actions">
        <label class="filename-field">
          出力ファイル名
          <input id="output-name" type="text" value="merged.pdf">
        </label>
        <button id="merge-btn" class="btn btn-primary">結合してダウンロード</button>
        <button id="clear-btn" class="btn btn-secondary">クリア</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <footer>
    <p>
      Powered by <a href="https://github.com/Hopding/pdf-lib" target="_blank" rel="noopener">pdf-lib</a> /
      <a id="repo-link" href="#" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
